name: validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: html-validate
        run: npx -y html-validate@11.5.3 index.html legal.html

      - name: sitemap is well-formed XML
        run: python3 -c "import xml.dom.minidom; xml.dom.minidom.parse('sitemap.xml')"

      - name: manifest and settings are valid JSON
        run: |
          python3 - <<'EOF'
          import json
          json.load(open('site.webmanifest'))
          json.load(open('.claude/settings.json'))
          EOF

      - name: JSON-LD blocks parse
        run: |
          python3 - <<'EOF'
          import re, json
          for page in ('index.html', 'legal.html'):
              html = open(page).read()
              blocks = re.findall(r'<script type="application/ld\+json">(.*?)</script>', html, re.S)
              assert blocks, f'no JSON-LD found in {page}'
              for b in blocks:
                  json.loads(b)
          EOF
